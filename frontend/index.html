<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Guitar Training</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.svg">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/fretboard.css">
    <link rel="stylesheet" href="/css/modes/find-the-note.css">
    <script type="module" src="/js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>
    <header>
        <h1>Guitar Training <span class="version">v0.4.0</span></h1>
        <button id="settings-toggle" aria-label="Settings">&#9881; Settings</button>
    </header>

    <nav id="main-nav"></nav>

    <main>
        <div id="content-area"></div>
        <div id="fretboard-container"></div>
    </main>

    <aside id="settings-drawer" aria-label="Settings panel"></aside>
    <div id="settings-backdrop" onclick="document.getElementById('settings-drawer').classList.remove('open')"></div>
</body>
</html>
